services:

  backend:
    build:
      context: ./Backend-blog

    container_name: blog-backend

    volumes:
      - ./Backend-blog/instance:/app/instance

    ports:
      - "5000:5000"

    restart: unless-stopped

  nginx:
    image: nginx:alpine

    container_name: blog-nginx

    ports:
      - "80:80"

    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend

    restart: unless-stopped
